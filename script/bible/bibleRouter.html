<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <button id="btn">PREVIOUS</button>
    <div id="root"></div>
    <script>
      const root = document.getElementById("root");
      const btn = document.getElementById("btn");

      function fetchBible(url) {
        return fetch(url, {
          headers: {
            Authtorisation:
              "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IldlZCBTZXAgMDcgMjAyMiAxMjozOTo1MyBHTVQrMDAwMC42MzBjOGIzMWNmNmQ5NjAwMjQ2OTMxMjIiLCJpYXQiOjE2NjI1NTQzOTN9.eiMFAfewhTuolmO6nkVgGU0RXKmwGedqD7IHsaNU7WE",
          },
        }).then((res) => {
          return res.json();
        });
      }
      
      function kek() {
        fetchBible("https://www.abibliadigital.com.br/api/books").then(
          (res) => {
            console.log(res);
            [...res].forEach((v) => {
              const newElem = document.createElement("div");
              newElem.innerHTML = v.author + " - " + v.name;
              newElem.onclick = () => getChapters(v.chapters, v.abbrev.en);
              // console.log(v.abbrev);
              root.append(newElem);
              btn.onclick = undefined;
            });
          }
        );
      }
      kek();

      function getChapters(chapters, abbrev) {
        root.innerHTML = "";
        for (let i = 0; i < chapters; i++) {
          let theNewElem = document.createElement("div");
          theNewElem.innerHTML = i + 1 + " chapter";
          root.append(theNewElem);
          btn.onclick = () => {
            root.innerHTML = "";
            kek();
          };
          theNewElem.onclick = () => {
            getVerse(abbrev, i + 1, chapters);
          };
        }
      }

      function getVerse(abbrev, chapter, chapters) {
        root.innerHTML = "";
        fetchBible(
          `https://www.abibliadigital.com.br/api/verses/bbe/${abbrev}/${chapter}`
        ).then((res) => {
          let kek = res.verses;
          console.log(kek.length);
          for (let i = 0; i < kek.length; i++) {
            const newElem = document.createElement("div");
            newElem.innerHTML = kek[i].text;
            root.append(newElem);
          }
          btn.onclick = () => {
            getChapters(chapters, abbrev);
          };
        });
      }
    </script>
  </body>
</html>
